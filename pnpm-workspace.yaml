packages:
  - playground
  - examples/*
  - packages/*
linkWorkspacePackages: 'deep'
ignoreWorkspaceRootCheck: true
strictPeerDependencies: true
allowBuilds:
  esbuild: false
  sharp: false
overrides:
  'astrobook@*': 'workspace:*'
minimumReleaseAgeExclude:
  - '@astrojs/svelte@9.0.0-alpha.2'
  - astro@7.0.0-beta.3

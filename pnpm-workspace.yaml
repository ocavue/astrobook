packages:
  - playground
  - examples/*
  - packages/*

linkWorkspacePackages: 'deep'

ignoreWorkspaceRootCheck: true

strictPeerDependencies: true

allowBuilds:
  esbuild: false
  sharp: false

overrides:
  'astrobook@*': 'workspace:*'

minimumReleaseAgeExclude:
  - '@astrojs/markdown-satteri@0.3.1'
  - '@astrojs/preact@6.0.0'
  - '@astrojs/react@6.0.0'
  - '@astrojs/solid-js@7.0.0'
  - '@astrojs/svelte@9.0.0'
  - '@astrojs/vue@7.0.0'
  - astro@7.0.0

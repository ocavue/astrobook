packages:
  - playground
  - examples/*
  - packages/*

linkWorkspacePackages: 'deep'

ignoreWorkspaceRootCheck: true

strictPeerDependencies: true

allowBuilds:
  esbuild: false
  sharp: false

overrides:
  'astrobook@*': 'workspace:*'

minimumReleaseAgeExclude:
  - astro@7.0.0-beta.4
  - '@ocavue/eslint-config@4.7.2'
